<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Authorization</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f9fafb;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin-bottom: 1rem;
    }
    .icon.loading { background: #dbeafe; color: #2563eb; animation: pulse 1.5s ease-in-out infinite; }
    .icon.success { background: #dcfce7; color: #16a34a; }
    .icon.error   { background: #fee2e2; color: #dc2626; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
    @keyframes spin  { to { transform: rotate(360deg); } }

    .spinner {
      width: 22px; height: 22px;
      border: 3px solid #93c5fd;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: .375rem; }
    p  { font-size: .875rem; color: #6b7280; line-height: 1.5; }

    .error-detail {
      margin-top: .75rem;
      padding: .625rem .875rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: .8rem;
      color: #b91c1c;
      text-align: left;
      word-break: break-word;
    }

    .close-hint {
      margin-top: 1.25rem;
      font-size: .75rem;
      color: #9ca3af;
    }

    @media (prefers-color-scheme: dark) {
      body  { background: #111827; color: #f9fafb; }
      .card { background: #1f2937; border-color: #374151; }
      .icon.loading { background: #1e3a5f; color: #60a5fa; }
      .icon.success { background: #14532d; color: #4ade80; }
      .icon.error   { background: #450a0a; color: #f87171; }
      p             { color: #9ca3af; }
      .error-detail { background: #1f0909; border-color: #7f1d1d; color: #f87171; }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <!-- Content injected by JS -->
  </div>

  <script>
    /**
     * OAuth Callback Handler
     *
     * This page is the redirect_uri for GitHub OAuth. It:
     *  1. Reads the `code` and `state` query params from the URL
     *  2. Sends them to the parent window via postMessage
     *  3. Shows a status UI (loading → success / error)
     *  4. Auto-closes after success
     */

    const card = document.getElementById('card');

    function render(state, message, detail) {
      const iconClass = { loading: 'loading', success: 'success', error: 'error' }[state];
      const iconInner = {
        loading: '<div class="spinner"></div>',
        success: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
        error:   '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
      }[state];
      const title = { loading: 'Authorizing…', success: 'Connected!', error: 'Authorization Failed' }[state];

      card.innerHTML = `
        <div class="icon ${iconClass}">${iconInner}</div>
        <h1>${title}</h1>
        <p>${message}</p>
        ${detail ? `<div class="error-detail">${detail}</div>` : ''}
        ${state === 'success' ? '<p class="close-hint">This window will close automatically.</p>' : ''}
        ${state === 'error'   ? '<p class="close-hint">You can close this window.</p>' : ''}
      `;
    }

    // Initial loading state
    render('loading', 'Completing GitHub authorization…');

    (function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code    = params.get('code');
      const state   = params.get('state');
      const error   = params.get('error');
      const errorDesc = params.get('error_description');

      // GitHub returned an error (user denied, app misconfigured, etc.)
      if (error) {
        const detail = errorDesc
          ? decodeURIComponent(errorDesc.replace(/\+/g, ' '))
          : error;
        render('error', 'GitHub returned an error.', detail);

        // Notify parent window of the failure
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(
            { type: 'github_oauth_callback', error: detail },
            '*'
          );
        }
        return;
      }

      // Missing code or state — malformed callback
      if (!code || !state) {
        render(
          'error',
          'Missing authorization parameters.',
          'The callback URL did not contain a code or state parameter. ' +
          'This may indicate a misconfigured OAuth App redirect URI.'
        );
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(
            { type: 'github_oauth_callback', error: 'Missing code or state in callback URL' },
            '*'
          );
        }
        return;
      }

      // Success — send code and state back to the config panel
      render('success', 'GitHub account connected successfully.');

      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(
          { type: 'github_oauth_callback', code, state },
          '*'
        );
      } else {
        // Fallback: parent window was closed — show manual instruction
        render(
          'error',
          'Parent window not found.',
          `Please copy the following code and paste it back in the app:\n\nCode: ${code}\nState: ${state}`
        );
        return;
      }

      // Auto-close after a brief delay
      setTimeout(() => window.close(), 1500);
    })();
  </script>
</body>
</html>

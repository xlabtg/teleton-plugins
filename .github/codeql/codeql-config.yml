name: "CodeQL config"

# Используем стандартный набор запросов CodeQL для JavaScript/TypeScript,
# но исключаем одно правило как подтверждённое ложное срабатывание.
#
# js/insufficient-password-hash (CWE-916) предназначено для обнаружения
# небезопасного ХРАНЕНИЯ паролей через быстрые хеш-функции (sha256/md5 и т.п.).
# Единственное срабатывание в репозитории — плагин polymarket
# (plugins/polymarket/lib/evm-wallet.js), где HMAC-SHA256 используется для
# ПОДПИСИ запросов к Polymarket CLOB API (схема L2-аутентификации, идентичная
# Coinbase Pro). Это корректный и обязательный алгоритм подписи, а не хеширование
# пользовательского пароля для хранения. Инлайн-подавление CodeQL в исходниках
# GitHub Code Scanning не учитывает надёжно, поэтому исключаем правило здесь.
query-filters:
  - exclude:
      id: js/insufficient-password-hash
